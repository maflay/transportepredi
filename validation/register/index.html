<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link rel="stylesheet" href="/validation/login/login.css">
    <link rel="stylesheet" href="/style/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>

<body>
    <div id="loading" class="loader-login">
        <div class="spinner-login"></div>
    </div>
    <section class="_content_main_register_">
        <form onsubmit="return false;" class="content_form_register">
            <img src="/assets/logo_transporte_prediccion_letra.png" alt="Transporte">
            <div class="content_input_form_register">
                <input class="form-control" type="text" name="nombre" id="nombre_trans" autocomplete="username"
                    placeholder="Nombre">
                <input class="form-control" type="text" name="apellido" id="apellido_trans" autocomplete="username"
                    placeholder="Apellido">
            </div>
            <div class="content_input_form_register">
                <input class="form-control" type="number" name="document" id="document_trans"
                    autocomplete="current-password" placeholder="# Documento">
            </div>
            <div class="content_input_form_register">
                <input class="form-control" type="password" name="password" id="password_trans"
                    autocomplete="current-password" placeholder="Password">
            </div>
            <div class="content_input_form_register">
                <input class="form-control" type="number" name="telefono" id="telefono_trans"
                    autocomplete="current-password" placeholder="Telefono">
            </div>
            <div class="content_input_form_register">
                <input class="form-control" type="text" name="correo" id="correo_trans" autocomplete="current-password"
                    placeholder="Correo">
            </div>
            <div class="content_input_form_register">
                <select name="tipo_vehiculo" id="tipo_vehiculo" class="form-control">
                    <option value="">Tipo de Vehículo</option>
                    <option value="MOTO">Moto</option>
                    <option value="CARRO">Carro</option>
                </select>
            </div>
            <div class="content_input_form_register">
                <input class="form-control" type="text" name="correo" id="placa_vehiculo"
                    autocomplete="current-password" placeholder="Placa">
            </div>
            <div class="content_btn_register">
                <button onclick="registerTrans()" class="btn btn-danger">Registrarse</button>
            </div>
            <a href="/validation/login/">Iniciar Session</a>
        </form>
    </section>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="/validation/login/login.js"></script>
</body>

</html>
