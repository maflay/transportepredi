<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <link rel="stylesheet" href="/validation/login/login.css">
  <link rel="stylesheet" href="/style/style.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>

<body>
   <div id="loading" class="loader-login">
        <div class="spinner-login"></div>
    </div>
  <section class="container _content_main_login_">
    <form onsubmit="return false;" class="content_form_login">
      <!-- <h2>Login</h2> -->
       <img src="/assets/logo_transporte_prediccion_letra.png" alt="Transporte">
      <div class="content_input_form_login">
        <input class="form-control" type="text" name="usuario" id="usuario_trans" autocomplete="username" placeholder="Usuario">
        <img src="/assets/usuario.png" alt="Transporte">
      </div>
      <div class="content_input_form_login">
        <input class="form-control" type="password" name="password" id="password_trans" autocomplete="current-password" placeholder="Password">
        <img src="/assets/password.png" alt="Transporte">
      </div>
      <div class="content_btn_login">
        <button onclick="ValidateSession()" class="btn btn-primary">Iniciar session</button>
      <a href="/validation/register/">Registrarse</a>
      </div>
    </form>
  </section>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
    crossorigin="anonymous"></script>
     <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="/validation/login/login.js"></script>
</body>

</html>
